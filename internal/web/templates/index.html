<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ .CSRFToken }}">
    <title>NiceBlocks</title>
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/csrf.js"></script>
    <script src="/static/js/tailwind.min.js"></script>
    <style>
        .grid-cols-40 { grid-template-columns: repeat(40, minmax(0, 1fr)); }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-300 font-sans selection:bg-blue-500/30 min-h-screen">
    <div class="max-w-6xl mx-auto px-8 py-12">
        <header class="flex items-center justify-between mb-16 border-b border-slate-800 pb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight text-white leading-none mb-1">
                        NICE<span class="text-blue-500">BLOCKS</span>
                    </h1>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Block Testing Redefined</span>
                    </div>
                </div>
            </div>
            
            <button hx-get="/devices" hx-target="#device-list" class="group flex items-center gap-3 bg-slate-800/50 hover:bg-blue-600/10 text-slate-400 hover:text-blue-400 px-6 py-3 rounded-xl text-[10px] font-black tracking-widest uppercase transition-all border border-slate-700 hover:border-blue-500/30 shadow-2xl active:scale-95">
                <svg class="w-4 h-4 transition-transform group-hover:rotate-180 duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.001 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh Nodes
            </button>
        </header>
        
        <main id="device-list" hx-get="/devices" hx-trigger="load" class="space-y-8"
             hx-on::response-error="handleForceStart(event)">
            <div class="flex flex-col items-center justify-center p-32 gap-4">
                <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-600">Interrogating Hardware...</span>
            </div>
        </main>

        <footer class="mt-24 pt-8 border-t border-slate-900 flex justify-between items-center text-[10px] font-bold text-slate-600 uppercase tracking-[0.2em]">
            <span>Secured AES-256 Pattern Engine</span>
            <span>Host: {{ .Hostname }}</span>
        </footer>
    </div>
</body>
</html>
