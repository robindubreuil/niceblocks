<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ .CSRFToken }}">
    <title>NiceBlocks</title>
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/csrf.js"></script>
    <script src="/static/js/grid.js"></script>
    <script src="/static/js/tailwind.min.js"></script>
    <style>
        .grid-cols-40 { grid-template-columns: repeat(40, minmax(0, 1fr)); }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-300 font-sans selection:bg-blue-500/30 min-h-screen">
    <div id="block-tooltip" class="fixed z-50 hidden bg-slate-900/95 border border-slate-600/50 rounded-lg px-3 py-2 shadow-xl pointer-events-none backdrop-blur-sm" style="min-width:140px">
        <div id="tt-header" class="font-mono text-[10px] text-slate-500 mb-1"></div>
        <div id="tt-write" class="hidden items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-blue-400 shrink-0"></span>
            <span id="tt-write-val" class="text-xs text-slate-300"></span>
        </div>
        <div id="tt-read" class="hidden items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shrink-0"></span>
            <span id="tt-read-val" class="text-xs text-slate-300"></span>
        </div>
    </div>
    <div class="max-w-6xl mx-auto px-8 py-12">
        <header class="flex items-center justify-between mb-16 border-b border-slate-800 pb-8">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl flex items-center justify-center shadow-[0_0_24px_rgba(37,99,235,0.35)] relative overflow-hidden">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12c0 2.21 3.582 4 8 4s8-1.79 8-4"></path>
                    </svg>
                    <svg class="w-4 h-4 text-emerald-300 absolute -bottom-0.5 -right-0.5 drop-shadow-[0_0_4px_rgba(52,211,153,0.6)]" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight text-white leading-none mb-1.5">
                        nice<span class="text-blue-500">blocks</span>
                    </h1>
                    <div class="flex items-center gap-2.5">
                        <div class="w-5 h-[2px] bg-blue-500/60 rounded-full"></div>
                        <span class="text-xs font-semibold text-slate-500 uppercase tracking-[0.15em]">Disk Integrity Verification</span>
                    </div>
                </div>
            </div>
            
            <button hx-get="/devices" hx-target="#device-list" class="group flex items-center gap-3 bg-slate-800/50 hover:bg-blue-600/10 text-slate-400 hover:text-blue-400 px-6 py-3 rounded-xl text-xs font-black tracking-widest uppercase transition-all border border-slate-700 hover:border-blue-500/30 shadow-2xl active:scale-95">
                <svg class="w-4 h-4 transition-transform group-hover:rotate-180 duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.001 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh Nodes
            </button>
        </header>
        
        <main id="device-list" hx-get="/devices" hx-trigger="load" class="space-y-8"
             hx-on::response-error="handleForceStart(event)">
            <div class="flex flex-col items-center justify-center p-32 gap-4">
                <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                <span class="text-xs font-black uppercase tracking-widest text-slate-600">Interrogating Hardware...</span>
            </div>
        </main>

        <footer class="mt-24 pt-8 border-t border-slate-900 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 text-xs font-semibold text-slate-500 tracking-wide">
            <span>Secured AES-256 Pattern Engine</span>
            <span>Host: {{ .Hostname }}</span>
            <div class="flex items-center gap-2">
                <span>GNU GPL v3</span>
                <span class="opacity-30">&middot;</span>
                <a href="https://github.com/robindubreuil" target="_blank" rel="noopener noreferrer" class="hover:text-blue-400 transition-colors">Robin Dubreuil</a>
            </div>
        </footer>
    </div>
</body>
</html>
